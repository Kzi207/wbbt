services:
  - type: web
    name: bot-web-manager
    runtime: node
    rootDir: ./web
    buildCommand: npm install
    startCommand: node server/index.cjs
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
