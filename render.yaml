services:
  - type: web
    name: bot-web-manager
    runtime: node
    buildCommand: cd web && npm install
    startCommand: node web/server/index.cjs
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_PATH
        value: /opt/render/project/src/web/node_modules
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
