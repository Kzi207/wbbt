services:
  - type: web
    name: bot-web-manager
    runtime: node
    buildCommand: cp web/package.json package.json && npm install
    startCommand: node web/server/index.cjs
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
