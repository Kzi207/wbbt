services:
  - type: web
    name: bot-web-manager
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: bot-data
      mountPath: /app/data
      sizeGB: 1
